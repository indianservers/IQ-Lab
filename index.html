<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IQ Lab — Cognitive Training Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══ APP HEADER ═══ -->
<header class="app-header">
  <div class="logo">🧠 IQ Lab</div>
  <nav class="header-stats">
    <span class="stat-chip flame"><span>🔥</span><span id="streak-count">0</span> day</span>
    <span class="stat-chip iq"><span>⚡</span>IQ <span id="header-iq">--</span></span>
    <span class="stat-chip level" id="level-badge">Beginner</span>
  </nav>
  <div class="header-actions">
    <button class="icon-btn" onclick="App.showAnalytics()" title="Analytics">📊</button>
    <button class="icon-btn" onclick="App.showProfile()" title="Profile">👤</button>
  </div>
</header>

<!-- ═══ SCREEN: DASHBOARD ═══ -->
<div id="screen-dashboard" class="screen active">

  <!-- Hero -->
  <section class="hero">
    <div class="hero-text">
      <h1>Train Your Brain</h1>
      <p>30 cognitive challenges to sharpen your mind every day</p>
    </div>
    <div id="daily-iq-card" class="daily-iq-card"></div>
  </section>

  <!-- Category filter -->
  <div class="category-bar">
    <button class="cat-btn active" data-cat="all">All (30)</button>
    <button class="cat-btn" data-cat="memory">🧠 Memory</button>
    <button class="cat-btn" data-cat="logic">🔮 Logic</button>
    <button class="cat-btn" data-cat="speed">⚡ Speed</button>
    <button class="cat-btn" data-cat="attention">👁 Attention</button>
    <button class="cat-btn" data-cat="reading">📖 Reading</button>
  </div>

  <!-- Games grid -->
  <div class="games-grid" id="games-grid"></div>

</div>

<!-- ═══ SCREEN: GAME ═══ -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="App.exitGame()">← Back</button>
    <div class="game-title-row">
      <span id="ghdr-icon" class="game-icon-lg"></span>
      <span id="ghdr-title" class="game-title-text"></span>
    </div>
    <div class="game-hdr-meta">
      <span id="ghdr-timer" class="timer-display"></span>
      <span id="ghdr-score" class="score-display"></span>
    </div>
  </div>
  <div id="game-content" class="game-content"></div>
</div>

<!-- ═══ SCREEN: RESULTS ═══ -->
<div id="screen-results" class="screen">
  <div class="results-wrapper">
    <div class="results-card">
      <div id="res-emoji" class="res-emoji">🏆</div>
      <h2 id="res-title">Great Performance!</h2>
      <div class="score-ring">
        <svg viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="52" fill="none" stroke="#1e2a4a" stroke-width="10"/>
          <circle id="score-ring-arc" cx="60" cy="60" r="52" fill="none" stroke="#8b5cf6"
                  stroke-width="10" stroke-dasharray="327" stroke-dashoffset="327"
                  stroke-linecap="round" transform="rotate(-90 60 60)"/>
        </svg>
        <span id="res-score">0</span>
      </div>
      <div id="res-details" class="res-details"></div>
      <div class="xp-badge" id="res-xp"></div>
      <div class="res-actions">
        <button class="btn-primary" onclick="App.replayGame()">Play Again</button>
        <button class="btn-ghost" onclick="App.showDashboard()">Dashboard</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ SCREEN: ANALYTICS ═══ -->
<div id="screen-analytics" class="screen">
  <div class="screen-inner">
    <div class="screen-hdr">
      <button class="back-btn" onclick="App.showDashboard()">← Back</button>
      <h2>Your Progress</h2>
    </div>
    <div id="analytics-content"></div>
  </div>
</div>

<!-- ═══ SCREEN: PROFILE ═══ -->
<div id="screen-profile" class="screen">
  <div class="screen-inner">
    <div class="screen-hdr">
      <button class="back-btn" onclick="App.showDashboard()">← Back</button>
      <h2>Profile</h2>
    </div>
    <div id="profile-content"></div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/games.js"></script>
<script src="js/games-v2.js"></script>
<script src="js/app.js"></script>
</body>
</html>
